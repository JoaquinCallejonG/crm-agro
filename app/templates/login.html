<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/output.css') }}">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-base-content">CRM Confección</h1>
      <p class="text-sm text-base-content/70 mt-2">
        Ingresa para acceder al sistema
      </p>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-300">
      <div class="card-body">
        
        <h2 class="card-title justify-center text-xl mb-4">Iniciar sesión</h2>

        {% if error %}
        <div class="alert alert-error mb-4">
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
          
          <div>
            <label for="email" class="label">
              <span class="label-text">Usuario</span>
            </label>
            <input 
              id="email"
              name="email"
              type="text"
              placeholder="admin"
              class="input input-bordered w-full"
              required
            >
          </div>

          <div>
            <label for="password" class="label">
              <span class="label-text">Contraseña</span>
            </label>
            <input 
              id="password"
              name="password"
              type="password"
              placeholder="1234"
              class="input input-bordered w-full"
              required
            >
          </div>

          <div class="pt-2">
            <button type="submit" class="btn btn-primary w-full">
              Entrar
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>

</body>
</html>
